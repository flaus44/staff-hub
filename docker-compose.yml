services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    ports:
      - "5433:5432"
    environment:
      POSTGRES_USER: staff
      POSTGRES_PASSWORD: staff_dev
      POSTGRES_DB: staff_hub
    volumes:
      - staff_hub_pg:/var/lib/postgresql/data

volumes:
  staff_hub_pg:
