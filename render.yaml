# staff-hub — FLAUS internal staff portal on Render
# Region: Singapore (APP 8 cross-border disclosure documented in docs/privacy-and-retention.md)

databases:
  - name: staff-hub-postgres
    plan: basic-1gb
    region: singapore
    postgresMajorVersion: 16
    databaseName: staff_hub
    user: staff
    ipAllowList: []

services:
  - type: web
    name: staff-hub
    runtime: docker
    region: singapore
    plan: starter
    dockerfilePath: ./apps/staff/Dockerfile
    dockerContext: .
    healthCheckPath: /api/health
    autoDeploy: true
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: "3000"
      - key: DATABASE_URL
        fromDatabase:
          name: staff-hub-postgres
          property: connectionString
      - key: PAYLOAD_SECRET
        generateValue: true
      - key: NEXT_PUBLIC_SERVER_URL
        sync: false
      - key: SEED_ADMIN_PASSWORD
        sync: false
